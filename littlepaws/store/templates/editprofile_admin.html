{% extends 'baseadmin.html' %} {% block content %}
<div class="container-fluid pt-5">
  <div class="border rounded p-4 m-4">
    <h1 class="display-4 pl-4 ml-4">Edit Profile</h1>
    <hr />
    <form
      action="{% url 'editprofileadmin' %}"
      method="POST"
      class="ml-5 mr-5"
    >
      {% csrf_token %}
        <div class="form-group col-lg">
          <label>Name</label>
          <input
            type="text"
            name="uname"
            class="form-control"
            placeholder="Name"
            pattern="^[a-zA-Z\s]+$"
            title="Name can only contain characters."
            value="{{euser.fullname}}"
          />
        </div>
        <div class="form-group col-lg">
          <label>Email</label>
          <input
            type="email"
            name="uemail"
            class="form-control"
            placeholder="Email"
            disabled
            value="{{euser.email}}"
          />
        </div>
        <div class="form-group col-lg">
          <label>Contact</label>
          <input
            type="tel"
            name="ucontact"
            class="form-control"
            maxlength="11"
            minlength="11"
            placeholder="Contact"
            pattern="^[03+]{2}[0-9+]{2}[0-9+]{7}$"
            title="03*********, follow this format. (* means number)"
            value="{{euser.contact}}"
          />
        </div>
        <div class="form-group col-lg">
          <label>CNIC</label>
          <input
            type="text"
            name="ucnic"
            class="form-control"
            placeholder="Cnic"
            pattern="^[0-9+]{5}-[0-9+]{7}-[0-9]{1}$"
            title="*****-*******-*, follow this format. (* means number)"
            value="{{euser.cnic}}"
          />
        </div>
        <div class="form-group col-lg-12">
          <button
            type="submit"
            class="btn btn-outline-success btn-lg btn-block"
          >
            Update
          </button>
        </div>
    </form>
  </div>
</div>
{% endblock %}
